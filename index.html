<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assam Online Bazar</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background:#f2f6ff;
}

/* TOP BAR */
.topbar{
  background:linear-gradient(90deg,#6a11cb,#2575fc);
  padding:12px;
  color:white;
}

.location{
  background:#ffffff;
  padding:6px 10px;
  border-radius:20px;
  color:#333;
  font-size:13px;
  margin-bottom:8px;
  display:inline-block;
}

.search{
  display:flex;
  background:white;
  border-radius:25px;
  padding:6px 10px;
}
.search input{
  border:none;
  flex:1;
  outline:none;
  font-size:14px;
}

/* CATEGORY SCROLL */
.categories{
  display:flex;
  overflow-x:auto;
  gap:12px;
  padding:12px;
  background:white;
}
.categories div{
  min-width:90px;
  text-align:center;
  font-size:12px;
  padding:10px;
  border-radius:15px;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:#222;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
}
.categories div:nth-child(2){
  background:linear-gradient(135deg,#a18cd1,#fbc2eb);
}
.categories div:nth-child(3){
  background:linear-gradient(135deg,#fbc2eb,#a6c1ee);
}
.categories div:nth-child(4){
  background:linear-gradient(135deg,#84fab0,#8fd3f4);
}
.categories div:nth-child(5){
  background:linear-gradient(135deg,#fccb90,#d57eeb);
}

/* BANNER */
.banner{
  margin:12px;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
}
.banner img{
  width:100%;
}

/* PRODUCT GRID */
.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}
.card{
  background:white;
  padding:10px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 6px 12px rgba(0,0,0,0.12);
  transition:transform 0.2s;
}
.card:hover{
  transform:scale(1.03);
}
.card img{
  width:100%;
  height:130px;
  object-fit:cover;
  border-radius:12px;
}
.card h4{
  margin:8px 0 4px;
}
.card p{
  color:#e91e63;
  font-weight:bold;
}
.card button{
  width:100%;
  padding:8px;
  background:linear-gradient(90deg,#ff512f,#dd2476);
  color:white;
  border:none;
  border-radius:20px;
  margin-top:6px;
  font-size:14px;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  border-top:1px solid #ddd;
  box-shadow:0 -4px 10px rgba(0,0,0,0.1);
}
.bottom-nav div{
  text-align:center;
  font-size:12px;
  color:#555;
}
.bottom-nav a{
  text-decoration:none;
  color:#555;
}
</style>
</head>

<body>

<!-- TOP SECTION -->
<div class="topbar">
  <div class="location">
    📍 Rajgarh, Sonari, Assam
  </div>
  <div class="search">
    🔍 <input type="text" placeholder="Search products...">
  </div>
</div>

<!-- CATEGORY ICONS -->
<div class="categories">
  <div>👕<br>Fashion</div>
  <div>📱<br>Mobiles</div>
  <div>💄<br>Beauty</div>
  <div>💻<br>Electronics</div>
  <div>🛒<br>Grocery</div>
</div>

<!-- BANNER -->
<div class="banner">
  <img src="https://via.placeholder.com/600x250">
</div>

<!-- PRODUCTS -->
<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h4>Mobile Phone</h4>
    <p>₹9999</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h4>T-Shirt</h4>
    <p>₹499</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h4>Shoes</h4>
    <p>₹1499</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h4>Watch</h4>
    <p>₹2499</p>
    <button>Buy Now</button>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div>🏠<br>Home</div>
  <div>📂<br>Categories</div>
  <div>🛒<br>Cart</div>
  <div>👤<br>Account</div>
</div>

</body>
</html>
